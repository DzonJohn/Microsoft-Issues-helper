<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGEX</title>
    <link rel="stylesheet" href="res/css/style.css">
</head>
<body>
    <main class="container">
        <div class="zero-spinner" aria-label="Spinning number 0"><span class="zero-spinner-digit">0</span></div>
        <h1>Regex matching validation</h1>

        <div class="form-grid">
            <div class="left-panel">
                <input type="text" id="regexText" placeholder="Regex pattern">
                <div class="sample-row">
                    <select id="sampleFileSelect" aria-label="Select sample data file">
                        <option value="">— select sample file —</option>
                    </select>
                    <textarea id="sampleText" placeholder="sample text" aria-label="Sample text input"></textarea>
                </div>
            </div>
            <textarea id="outputText" placeholder="Output" readonly aria-label="Output"></textarea>
        </div>
    </main>
    <script src="res/js/main.js"></script>
</body>

</html>
