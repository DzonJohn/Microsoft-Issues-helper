<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGEX</title>
    <link rel="stylesheet" href="res/css/style.css">
</head>
<body>
    <main class="container">
        <div class="microsoft-logo" aria-label="Microsoft logo">
            <span class="logo-tile tile-red" aria-hidden="true"></span>
            <span class="logo-tile tile-green" aria-hidden="true"></span>
            <span class="logo-tile tile-blue" aria-hidden="true"></span>
            <span class="logo-tile tile-yellow" aria-hidden="true"></span>
        </div>
        <div class="zero-spinner" aria-label="Spinning number 0"><span class="zero-spinner-digit">0</span></div>
        <h1>Regex matching validation</h1>

        <div class="form-grid">
            <div class="regex-row wide-field">
                <input type="text" id="regexText" placeholder="Regex pattern">
            </div>
            <select id="sampleFileSelect" class="wide-field" aria-label="Select sample data file">
                <option value="">— select sample file —</option>
            </select>
            <div class="sample-text-stack">
                <div id="sampleHighlight" class="sample-highlight" aria-hidden="true"></div>
                <textarea id="sampleText" placeholder="sample text" rows="10"></textarea>
            </div>
            <textarea id="outputText" placeholder="Output" readonly rows="8"></textarea>
            <hr class="section-divider">
            <button type="button" id="searchOtherFilesBtn">Search other files</button>
            <textarea id="otherMatchesOutput" placeholder="Other found matches" readonly rows="6"></textarea>
            <a id="moreMatchesLink" class="more-matches-link" href="other-matches.html">more</a>
        </div>
    </main>
    <script src="res/js/main.js"></script>
</body>

</html>
